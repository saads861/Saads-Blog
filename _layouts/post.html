<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
</head>
<body>
    <article>
        <header>
            <h1>{{ page.title }}</h1>
            <p><em>Published on {{ page.date | date: "%Y-%m-%d" }} by {{ page.author }}</em></p>
        </header>
        <div class="content">
            {{ content }}
        </div>
        <footer>
            <a href="/blog/">Back to Blog</a>
        </footer>
    </article>
</body>
</html>
