<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
</head>
<body>
    <header>
        <h1>Featured Posts</h1>
    </header>
    <main>
        <section id="featured-posts">
            <!-- Featured posts should be rendered here -->
            {% for post in site.posts limit: 5 %}
            <article>
                <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
                <p>{{ post.excerpt }}</p>
                <small>Published on {{ post.date | date: "%Y-%m-%d" }}</small>
            </article>
            {% endfor %}
        </section>
    </main>
    <footer>
        <p>&copy; {{ site.time | date: "%Y" }} My Blog</p>
    </footer>
</body>
</html>
